name: Discord Automation

on:
  pull_request:
    types:
      - closed

jobs:
  discord-webhook:
    runs-on: ubuntu-latest
    steps:
    - env:
        DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        DISCORD_EMBEDS: '{"embeds": [{"title": "Hello!","description": "Hi! :grinning:"}]}'
      uses: Ilshidur/action-discord@0.3.2
      if: "${{ env.DISCORD_WEBHOOK != '' }}"
      with:
        args: '{{ DISCORD_EMBEDS }}'
